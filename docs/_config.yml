# VisionPack documentation site (GitHub Pages, Jekyll + just-the-docs).
#
# To publish: Repository Settings -> Pages -> Build and deployment ->
#   Source: "Deploy from a branch", Branch: main, Folder: /docs.
# GitHub's classic Pages build loads the jekyll-remote-theme plugin, so no extra
# workflow is needed. For a local preview see the Gemfile in this folder.

title: VisionPack
description: >-
  DatasetOps for computer vision — turn scattered images and labels into a clean,
  versioned, leak-free, ready-to-train dataset, from your laptop to S3/GCS.

# Project site lives at https://caiowing.github.io/VisionPack/
url: https://caiowing.github.io
baseurl: /VisionPack

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Clean URLs (usage.md -> /usage/).
permalink: pretty

# Sidebar search.
search_enabled: true
search:
  heading_level: 2
  previews: 3
  tokenizer_separator: /[\s/]+/

# Dark reading theme.
color_scheme: dark

# Header links (open in a new tab).
aux_links:
  GitHub: https://github.com/CaioWing/VisionPack
  PyPI: https://pypi.org/project/visionpack/
aux_links_new_tab: true

# "Edit this page on GitHub" footer link.
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/CaioWing/VisionPack
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: edit

footer_content: >-
  VisionPack is licensed under Apache-2.0. Built for the messy part of training
  computer-vision models.

# Note / warning / tip callout boxes used across the pages.
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Heads-up
    color: yellow

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  # Internal design docs — kept local, never published to the site.
  - DESIGN.md
  - SPEC.md
  - SPEC-cloud-sync.md
