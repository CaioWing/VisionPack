name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: uv run python -m unittest discover -s tests -q
      # Coverage is measured (and gated by fail_under in pyproject.toml) on
      # Linux only: the platform-specific branches make the number jitter
      # across OSes, and one stable ratchet is what we want.
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run coverage run -m unittest discover -s tests -q
          uv run coverage report

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Validate metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
