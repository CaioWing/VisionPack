<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VisionPack</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232a78d6'/%3E%3Cpath d='M8 10l8 13 8-13' fill='none' stroke='%23fff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root {
    --surface: #fcfcfb;
    --surface-2: #f4f3f0;
    --surface-3: #ecece8;
    --border: #e2e1dc;
    --text: #0b0b0b;
    --text-2: #52514e;
    --text-3: #8a8984;
    --accent: #2a78d6;
    --accent-soft: #e3eefb;
    --good: #0ca30c;
    --critical: #d03b3b;
    --warning: #b97f00;
    --viz-1: #2a78d6;  /* train / single-series */
    --viz-2: #1baf7a;  /* val */
    --viz-3: #eda100;  /* test */
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19;
      --surface-2: #232322;
      --surface-3: #2c2c2a;
      --border: #383835;
      --text: #ffffff;
      --text-2: #c3c2b7;
      --text-3: #8a8984;
      --accent: #3987e5;
      --accent-soft: #1e3352;
      --good: #2fbf2f;
      --critical: #e66767;
      --warning: #c98500;
      --viz-1: #3987e5;
      --viz-2: #199e70;
      --viz-3: #c98500;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--surface); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 5;
  }
  .brand { font-weight: 700; letter-spacing: .2px; }
  .brand span { color: var(--accent); }
  .chip {
    font-size: 12px; padding: 2px 10px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2);
  }
  .chip.task { background: var(--accent-soft); color: var(--accent); border-color: transparent; font-weight: 600; }
  header .spacer { flex: 1; }
  main { max-width: 1180px; margin: 0 auto; padding: 20px 24px 120px; }
  h2 { font-size: 15px; margin: 30px 0 12px; display: flex; align-items: center; gap: 8px; }
  h2 .count { color: var(--text-3); font-weight: 400; }

  /* pipeline */
  .pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 10px; margin-top: 16px; }
  .step {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow);
  }
  .step .n { font-size: 11px; color: var(--text-3); }
  .step .t { font-weight: 650; }
  .step .s { font-size: 12px; color: var(--text-2); min-height: 18px; }
  .step .actions { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

  button {
    font: inherit; font-size: 12.5px; padding: 5px 12px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
  }
  button:hover { background: var(--surface-3); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); background: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; color: var(--text-3); font-weight: 600; }
  th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .panel { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); overflow-x: auto; }
  .provider {
    font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 5px;
    background: var(--surface-3); color: var(--text-2); text-transform: uppercase; letter-spacing: .5px;
  }
  .provider.s3 { color: #b97f00; } .provider.gs, .provider.gcs { color: var(--accent); }
  .provider.az, .provider.abfs { color: #7c6fe0; } .provider.local { color: var(--good); }

  /* stats */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .tile { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .tile .v { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .tile .l { font-size: 12px; color: var(--text-2); }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  @media (max-width: 860px) { .charts { grid-template-columns: 1fr; } }
  .chart-title { font-size: 13px; font-weight: 650; margin-bottom: 10px; }
  .hbar { display: grid; grid-template-columns: minmax(70px, max-content) 1fr max-content; gap: 4px 10px; align-items: center; }
  .hbar .label { font-size: 12.5px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .hbar .track { height: 16px; border-radius: 4px; background: var(--surface-3); overflow: hidden; }
  .hbar .fill { height: 100%; border-radius: 4px; background: var(--viz-1); min-width: 2px; }
  .hbar .value { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .seg-row { margin-bottom: 14px; }
  .seg-title { font-size: 12.5px; color: var(--text-2); margin-bottom: 5px; display: flex; gap: 8px; align-items: center; }
  .seg { display: flex; height: 18px; border-radius: 4px; overflow: hidden; gap: 2px; background: var(--surface); }
  .seg div { min-width: 3px; }
  .legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .legend .item { display: flex; gap: 6px; align-items: center; font-size: 12.5px; color: var(--text-2); }
  .legend .swatch { width: 10px; height: 10px; border-radius: 3px; }

  /* gallery */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 10px; }
  .thumb { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .thumb img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--surface-3); }
  .thumb .meta { padding: 6px 8px; font-size: 11px; color: var(--text-2); display: flex; justify-content: space-between; gap: 4px; align-items: center; }
  .thumb .cls { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pager { display: flex; gap: 8px; align-items: center; margin-top: 10px; color: var(--text-2); font-size: 12.5px; }

  .lock { color: var(--warning); font-size: 12px; font-weight: 600; }
  .ok { color: var(--good); font-weight: 600; }
  .err { color: var(--critical); font-weight: 600; }
  .warn { color: var(--warning); font-weight: 600; }
  .muted { color: var(--text-3); }
  code { background: var(--surface-3); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  /* job bar */
  #jobbar {
    position: fixed; left: 0; right: 0; bottom: 0; background: var(--surface-2);
    border-top: 1px solid var(--border); padding: 10px 24px; display: none; z-index: 20;
  }
  #jobbar.active { display: flex; align-items: center; gap: 14px; }
  #jobbar .bar { flex: 1; height: 8px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
  #jobbar .bar div { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
  #jobbar .pct { font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

  /* modal */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; z-index: 30; }
  #overlay.open { display: flex; align-items: center; justify-content: center; padding: 20px; }
  #modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    max-width: 720px; width: 100%; max-height: 82vh; overflow: auto; padding: 20px 22px; box-shadow: 0 12px 40px rgba(0,0,0,.3);
  }
  #modal h3 { margin: 0 0 12px; font-size: 16px; }
  .form-row { display: flex; gap: 10px; margin: 10px 0; align-items: center; flex-wrap: wrap; }
  .form-row label { min-width: 90px; color: var(--text-2); font-size: 13px; }
  input, select {
    font: inherit; padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
  }
  input[type=number] { width: 90px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* toast */
  #toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--surface); padding: 9px 18px; border-radius: 9px;
    font-size: 13px; display: none; z-index: 40; max-width: 80vw;
  }
  .issue { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .empty { color: var(--text-3); padding: 16px 0; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="brand">Vision<span>Pack</span></div>
  <span class="chip task" id="h-task">…</span>
  <span class="chip" id="h-name">loading…</span>
  <div class="spacer"></div>
  <span class="chip" id="h-assets">– assets</span>
  <span class="chip" id="h-snapshots">– snapshots</span>
  <button onclick="refreshAll()">Refresh</button>
</header>

<main>
  <section>
    <div class="pipeline" id="pipeline"></div>
  </section>

  <h2>Sources <span class="count" id="sources-count"></span></h2>
  <div class="panel" id="sources-panel"><div class="empty">loading…</div></div>

  <h2>Dataset</h2>
  <div class="tiles" id="tiles"></div>
  <div class="charts">
    <div class="panel">
      <div class="chart-title">Objects per class</div>
      <div id="class-chart" class="hbar"></div>
    </div>
    <div class="panel">
      <div class="chart-title">Split composition (images)</div>
      <div id="split-chart"></div>
    </div>
  </div>

  <h2>Assets <span class="count" id="assets-count"></span></h2>
  <div class="gallery" id="gallery"></div>
  <div class="pager">
    <button id="prev" onclick="page(-1)">‹ Prev</button>
    <span id="page-info"></span>
    <button id="next" onclick="page(1)">Next ›</button>
  </div>

  <h2>Versions</h2>
  <div class="charts">
    <div class="panel">
      <div class="chart-title">Splits</div>
      <div id="splits-list"></div>
    </div>
    <div class="panel">
      <div class="chart-title">Snapshots</div>
      <div id="snapshots-list"></div>
    </div>
  </div>

  <h2>Activity</h2>
  <div class="panel" id="jobs-list"><div class="empty">no jobs yet</div></div>
</main>

<div id="jobbar">
  <span id="job-label">…</span>
  <div class="bar"><div id="job-fill" style="width:0%"></div></div>
  <span class="pct" id="job-pct"></span>
</div>

<div id="overlay" onclick="if(event.target===this) closeModal()">
  <div id="modal"></div>
</div>
<div id="toast"></div>

<script>
"use strict";
const state = {
  project: null, sources: [], stats: null, splits: [], snapshots: [],
  assets: { total: 0, items: [] }, offset: 0, limit: 24,
  activeJob: null, jobTimer: null,
};

const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = (n) => (n ?? 0).toLocaleString();
const bytes = (n) => {
  if (!n) return "0 B";
  const units = ["B","KB","MB","GB","TB"]; let i = 0;
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(n >= 100 || i === 0 ? 0 : 1)} ${units[i]}`;
};

async function api(path, options) {
  const response = await fetch(path, options && {
    method: options.method || "POST",
    headers: { "Content-Type": "application/json" },
    body: options.body === undefined ? undefined : JSON.stringify(options.body),
  });
  if (!response.ok) {
    let detail = `${response.status}`;
    try { detail = (await response.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  return response.json();
}

function toast(message, ms = 4200) {
  const el = $("toast");
  el.textContent = message; el.style.display = "block";
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = "none", ms);
}

/* ---------- data loading ---------- */

async function refreshAll() {
  try {
    const [project, sources, stats, splits, snapshots] = await Promise.all([
      api("/api/project"), api("/api/sources"), api("/api/stats"),
      api("/api/splits"), api("/api/snapshots"),
    ]);
    Object.assign(state, { project, sources, stats, splits, snapshots });
    renderHeader(); renderPipeline(); renderSources(); renderStats();
    renderSplits(); renderSnapshots();
    await loadAssets();
    await renderJobs();
  } catch (err) { toast(`Failed to load: ${err.message}`); }
}

async function loadAssets() {
  state.assets = await api(`/api/assets?offset=${state.offset}&limit=${state.limit}`);
  renderGallery();
}

/* ---------- rendering ---------- */

function renderHeader() {
  const p = state.project;
  $("h-name").textContent = p.name;
  $("h-task").textContent = p.task;
  $("h-assets").textContent = `${fmt(p.counts.assets)} assets`;
  $("h-snapshots").textContent = `${fmt(p.counts.snapshots)} snapshots`;
}

function renderPipeline() {
  const p = state.project, s = state.stats?.overall || {};
  const lockedSplits = state.splits.filter((x) => x.locked).length;
  const steps = [
    { t: "Sources", s: `${p.counts.sources} declared`, actions: [] },
    { t: "Sync", s: `${fmt(p.counts.assets)} assets in index`,
      actions: [["Preview", "openPlan()"], ["Sync now", "startSync()", true]] },
    { t: "Validate", s: "catch leakage & bad labels", actions: [["Run", "startValidate()", true]] },
    { t: "Split", s: state.splits.length ? `${state.splits.length} split(s), ${lockedSplits} locked` : "no splits yet",
      actions: [["Create", "openSplitForm()", true]] },
    { t: "Snapshot", s: `${p.counts.snapshots} version(s)`, actions: [["Create", "openSnapshotForm()", true]] },
    { t: "Export", s: "ready-to-train layout", actions: [["Export", "openExportForm()", true]] },
  ];
  $("pipeline").innerHTML = steps.map((step, i) => `
    <div class="step">
      <span class="n">STEP ${i + 1}</span>
      <span class="t">${step.t}</span>
      <span class="s">${esc(step.s)}</span>
      <div class="actions">${step.actions.map(([label, fn, primary]) =>
        `<button ${primary ? 'class="primary"' : ""} onclick="${fn}">${label}</button>`).join("")}</div>
    </div>`).join("");
}

function renderSources() {
  $("sources-count").textContent = `(${state.sources.length})`;
  if (!state.sources.length) {
    $("sources-panel").innerHTML = `<div class="empty">No sources declared. Add a <code>sources:</code> block to <code>visionpack.yaml</code>.</div>`;
    return;
  }
  $("sources-panel").innerHTML = `<table><thead><tr>
      <th>Name</th><th>Provider</th><th>Format</th><th>Images</th><th>Labels</th><th>Match</th><th>Copy</th><th></th>
    </tr></thead><tbody>${state.sources.map((src) => {
      const uri = (v) => typeof v === "object" && v ? v.uri : v;
      return `<tr>
        <td><strong>${esc(src.name)}</strong></td>
        <td><span class="provider ${esc(src.provider)}">${esc(src.provider)}</span></td>
        <td>${esc(src.format || "yolo")}</td>
        <td class="muted">${esc(uri(src.images) || uri(src.root) || "—")}</td>
        <td class="muted">${esc(uri(src.labels) || "—")}</td>
        <td>${esc(src.match || "—")}</td>
        <td><code>${esc(src.copy || "ingest")}</code></td>
        <td><button onclick="startSync('${esc(src.name)}')">Sync</button></td>
      </tr>`;
    }).join("")}</tbody></table>`;
}

function renderStats() {
  const s = state.stats?.overall;
  if (!s) return;
  $("tiles").innerHTML = [
    [fmt(s.assets), "images"],
    [fmt(s.objects), "objects"],
    [fmt(s.classes), "classes"],
    [s.avg_labels_per_image, "labels / image"],
    [fmt(s.images_without_annotations), "unlabeled"],
    [bytes(s.total_size_bytes), "total size"],
  ].map(([v, l]) => `<div class="tile"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");

  const dist = Object.entries(s.class_distribution || {}).sort((a, b) => b[1] - a[1]);
  const top = dist.slice(0, 15);
  const max = Math.max(1, ...top.map(([, count]) => count));
  $("class-chart").innerHTML = top.length ? top.map(([name, count]) => `
      <div class="label" title="${esc(name)}">${esc(name)}</div>
      <div class="track" title="${esc(name)}: ${fmt(count)}"><div class="fill" style="width:${(count / max * 100).toFixed(1)}%"></div></div>
      <div class="value">${fmt(count)}</div>`).join("")
    : `<div class="empty" style="grid-column:1/-1">no labeled objects yet</div>`;
  if (dist.length > top.length) {
    $("class-chart").insertAdjacentHTML("beforeend",
      `<div class="muted" style="grid-column:1/-1;font-size:12px;margin-top:4px">+ ${dist.length - top.length} more classes</div>`);
  }

  const setColors = { train: "var(--viz-1)", val: "var(--viz-2)", test: "var(--viz-3)" };
  const breakdowns = state.stats.splits || {};
  const rows = Object.values(breakdowns).map((b) => {
    const total = Math.max(1, Object.values(b.sets).reduce((acc, x) => acc + x.images, 0));
    const order = ["train", "val", "test"].filter((k) => b.sets[k]);
    return `<div class="seg-row">
      <div class="seg-title"><strong>${esc(b.split_id)}</strong>
        <span class="muted">${esc(b.strategy)}</span>${b.locked ? '<span class="lock">🔒 locked</span>' : ""}</div>
      <div class="seg">${order.map((k) =>
        `<div style="flex:${b.sets[k].images};background:${setColors[k]}" title="${k}: ${fmt(b.sets[k].images)} images"></div>`).join("")}</div>
      <div class="legend">${order.map((k) =>
        `<span class="item"><span class="swatch" style="background:${setColors[k]}"></span>${k} · ${fmt(b.sets[k].images)} (${(b.sets[k].images / total * 100).toFixed(0)}%)</span>`).join("")}</div>
    </div>`;
  });
  $("split-chart").innerHTML = rows.length ? rows.join("") : `<div class="empty">no splits yet — create one in the pipeline above</div>`;
}

function renderGallery() {
  const { total, items } = state.assets;
  $("assets-count").textContent = `(${fmt(total)})`;
  $("gallery").innerHTML = items.length ? items.map((a) => `
    <div class="thumb">
      <img loading="lazy" src="/api/assets/${a.id}/file" alt="${esc(a.id)}"
           onerror="this.style.opacity=.25;this.alt='unavailable'">
      <div class="meta">
        <span class="cls" title="${esc(a.classes.join(', '))}">${a.objects ? `${a.objects} obj` : "no labels"}${a.classes.length ? " · " + esc(a.classes.join(", ")) : ""}</span>
        <span class="provider ${esc(a.provider)}">${esc(a.provider)}</span>
      </div>
    </div>`).join("") : `<div class="empty" style="grid-column:1/-1">no assets — run a sync</div>`;
  const pageNo = Math.floor(state.offset / state.limit) + 1;
  const pages = Math.max(1, Math.ceil(total / state.limit));
  $("page-info").textContent = `page ${pageNo} / ${pages}`;
  $("prev").disabled = state.offset === 0;
  $("next").disabled = state.offset + state.limit >= total;
}

function page(direction) {
  state.offset = Math.max(0, state.offset + direction * state.limit);
  loadAssets().catch((err) => toast(err.message));
}

function renderSplits() {
  $("splits-list").innerHTML = state.splits.length ? `<table><tbody>${state.splits.map((split) => `
    <tr>
      <td><strong>${esc(split.id)}</strong> <span class="muted">${esc(split.strategy)}</span></td>
      <td class="muted">${Object.entries(split.sets).map(([k, n]) => `${k}=${fmt(n)}`).join(" · ")}</td>
      <td>${split.locked ? '<span class="lock">🔒 locked</span>' : `<button onclick="lockSplit('${esc(split.id)}')">Lock</button>`}</td>
    </tr>`).join("")}</tbody></table>` : `<div class="empty">none yet</div>`;
}

function renderSnapshots() {
  $("snapshots-list").innerHTML = state.snapshots.length ? `<table><tbody>${[...state.snapshots].reverse().map((snap) => `
    <tr>
      <td><strong>${esc(snap.version)}</strong></td>
      <td>${esc(snap.message || "")}</td>
      <td class="muted">${esc((snap.created_at || "").slice(0, 19).replace("T", " "))}</td>
    </tr>`).join("")}</tbody></table>` : `<div class="empty">none yet</div>`;
}

async function renderJobs() {
  const jobs = await api("/api/jobs");
  $("jobs-list").innerHTML = jobs.length ? `<table><thead><tr>
      <th>Job</th><th>Detail</th><th>State</th><th>Progress</th><th>Started</th></tr></thead><tbody>${
    jobs.map((job) => `<tr>
      <td><strong>${esc(job.kind)}</strong></td>
      <td class="muted">${esc(job.detail)}</td>
      <td class="${job.state === "done" ? "ok" : job.state === "error" ? "err" : "warn"}">${job.state}${job.error ? ` — ${esc(job.error)}` : ""}</td>
      <td class="muted">${job.total ? `${fmt(job.done)} / ${fmt(job.total)}` : "—"}</td>
      <td class="muted">${esc((job.created_at || "").slice(11, 19))}</td>
    </tr>`).join("")}</tbody></table>` : `<div class="empty">no jobs yet</div>`;
}

/* ---------- jobs ---------- */

async function startJob(path, body, label) {
  try {
    const job = await api(path, { body });
    trackJob(job.id, label);
  } catch (err) { toast(err.message); }
}

function trackJob(jobId, label) {
  state.activeJob = jobId;
  $("jobbar").classList.add("active");
  $("job-label").textContent = label;
  clearInterval(state.jobTimer);
  state.jobTimer = setInterval(async () => {
    let job;
    try { job = await api(`/api/jobs/${jobId}`); } catch { return; }
    const pct = job.total ? Math.round(job.done / job.total * 100) : (job.state === "running" ? 8 : 0);
    $("job-fill").style.width = `${pct}%`;
    $("job-pct").textContent = job.total ? `${pct}%` : "…";
    if (job.state === "done" || job.state === "error") {
      clearInterval(state.jobTimer);
      $("jobbar").classList.remove("active");
      state.activeJob = null;
      if (job.state === "error") toast(`${label} failed: ${job.error}`);
      else onJobDone(job, label);
      refreshAll();
    }
  }, 700);
}

function onJobDone(job, label) {
  if (job.kind === "validate") return showValidationResult(job.result);
  if (job.kind === "sync") {
    const added = (job.result || []).reduce((acc, s) => acc + s.assets_added, 0);
    const failed = (job.result || []).reduce((acc, s) => acc + s.failures.length, 0);
    return toast(`Sync done: ${fmt(added)} new asset(s)${failed ? `, ${failed} failure(s)` : ""}`);
  }
  if (job.kind === "export") return toast(`Export done → ${job.result?.output || "exports/"}`);
  toast(`${label} done`);
}

const startSync = (source) => startJob("/api/sync", source ? { source } : {}, source ? `Syncing ${source}` : "Syncing all sources");
const startValidate = () => startJob("/api/validate", undefined, "Validating dataset");

/* ---------- modals ---------- */

function openModal(html) { $("modal").innerHTML = html; $("overlay").classList.add("open"); }
function closeModal() { $("overlay").classList.remove("open"); }

async function openPlan() {
  openModal(`<h3>Sync preview (dry-run)</h3><div class="empty">listing source metadata…</div>`);
  try {
    const plans = await api("/api/sync/plan", { body: {} });
    openModal(`<h3>Sync preview (dry-run)</h3>
      ${plans.map((plan) => `
        <div class="panel" style="margin-bottom:10px">
          <strong>${esc(plan.name)}</strong> <span class="muted">${esc(plan.format)}</span><br>
          <span class="muted">images:</span> <code>${esc(plan.images_uri)}</code><br>
          ${plan.labels_uri ? `<span class="muted">labels:</span> <code>${esc(plan.labels_uri)}</code><br>` : ""}
          found <strong>${fmt(plan.images_found)}</strong> images, <strong>${fmt(plan.labels_found)}</strong> labels
          → <strong>${fmt(plan.matched)}</strong> matched
          ${plan.images_without_label ? `<span class="warn"> · ${fmt(plan.images_without_label)} images without label</span>` : ""}
          ${plan.labels_without_image ? `<span class="warn"> · ${fmt(plan.labels_without_image)} labels without image</span>` : ""}
          ${plan.class_names.length ? `<br><span class="muted">classes:</span> ${plan.class_names.map(esc).join(", ")}` : ""}
        </div>`).join("")}
      <div class="modal-actions">
        <button onclick="closeModal()">Close</button>
        <button class="primary" onclick="closeModal(); startSync()">Sync now</button>
      </div>`);
  } catch (err) { openModal(`<h3>Sync preview</h3><p class="err">${esc(err.message)}</p><div class="modal-actions"><button onclick="closeModal()">Close</button></div>`); }
}

function openSplitForm() {
  openModal(`<h3>Create split</h3>
    <div class="form-row"><label>Ratios</label>
      train <input id="f-train" type="number" step="0.05" min="0" max="1" value="0.8">
      val <input id="f-val" type="number" step="0.05" min="0" max="1" value="0.1">
      test <input id="f-test" type="number" step="0.05" min="0" max="1" value="0.1">
    </div>
    <div class="form-row"><label>Strategy</label>
      <select id="f-strategy">
        <option value="stratified">stratified — balance classes per set</option>
        <option value="random">random — deterministic shuffle</option>
        <option value="hash">hash — stable as data grows</option>
      </select>
    </div>
    <div class="form-row"><label>Seed</label><input id="f-seed" type="number" value="0"></div>
    <div class="form-row"><label>Split id</label><input id="f-splitid" value="default"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="submitSplit()">Create</button>
    </div>`);
}

async function submitSplit() {
  try {
    const split = await api("/api/splits", { body: {
      train: parseFloat($("f-train").value), val: parseFloat($("f-val").value), test: parseFloat($("f-test").value),
      strategy: $("f-strategy").value, seed: parseInt($("f-seed").value || "0", 10), split_id: $("f-splitid").value || "default",
    }});
    closeModal();
    toast(`Split '${split.id}' created: ${Object.entries(split.sets).map(([k, n]) => `${k}=${n}`).join(", ")}`);
    refreshAll();
  } catch (err) { toast(err.message); }
}

async function lockSplit(splitId) {
  try { await api(`/api/splits/${splitId}/lock`, { body: undefined }); toast(`Split '${splitId}' locked`); refreshAll(); }
  catch (err) { toast(err.message); }
}

function openSnapshotForm() {
  openModal(`<h3>Create snapshot</h3>
    <div class="form-row"><label>Message</label><input id="f-message" style="flex:1" placeholder="e.g. baseline after camera-B sync"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="submitSnapshot()">Create</button>
    </div>`);
  setTimeout(() => $("f-message").focus(), 50);
}

async function submitSnapshot() {
  const message = $("f-message").value.trim();
  if (!message) return toast("A snapshot message is required.");
  try {
    const snap = await api("/api/snapshots", { body: { message } });
    closeModal(); toast(`Snapshot ${snap.version} created`); refreshAll();
  } catch (err) { toast(err.message); }
}

function openExportForm() {
  const options = state.splits.map((s) => `<option value="${esc(s.id)}">${esc(s.id)}</option>`).join("");
  openModal(`<h3>Export dataset</h3>
    <div class="form-row"><label>Format</label>
      <select id="f-format">
        <option value="yolo">YOLO</option><option value="coco">COCO</option>
        <option value="imagefolder">ImageFolder</option><option value="masks">Semantic masks</option>
      </select>
    </div>
    <div class="form-row"><label>Split</label>
      <select id="f-split"><option value="">(no split — flat)</option>${options}</select>
    </div>
    <div class="form-row"><label>Output</label><input id="f-output" style="flex:1" placeholder="exports/<format> (default)"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="submitExport()">Export</button>
    </div>`);
}

function submitExport() {
  const body = { format: $("f-format").value, split: $("f-split").value || null, output: $("f-output").value || null };
  closeModal();
  startJob("/api/export", body, `Exporting ${body.format}`);
}

function showValidationResult(result) {
  if (!result) return;
  const head = result.ok
    ? `<p class="ok">✓ Validation passed — ${result.warnings} warning(s)</p>`
    : `<p class="err">✗ ${result.errors} error(s), ${result.warnings} warning(s)</p>`;
  openModal(`<h3>Validation report</h3>${head}
    ${result.issues.map((issue) => `<div class="issue">
      <span class="${issue.severity === "error" ? "err" : "warn"}">${esc(issue.severity)}</span>
      <code>${esc(issue.code)}</code> ${esc(issue.message)}
    </div>`).join("") || '<div class="empty">no issues 🎉</div>'}
    ${result.truncated ? '<p class="muted">…list truncated</p>' : ""}
    <div class="modal-actions"><button onclick="closeModal()">Close</button></div>`);
}

document.addEventListener("keydown", (event) => { if (event.key === "Escape") closeModal(); });
refreshAll();
</script>
</body>
